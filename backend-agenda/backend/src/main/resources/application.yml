spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agendas_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
  state-expiration-seconds: ${GOOGLE_STATE_EXPIRATION_SECONDS:600}
  state-cookie-secure: ${GOOGLE_STATE_COOKIE_SECURE:false}

gemini:
  api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/interactions}
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

app:
  frontend-auth-callback-url: ${FRONTEND_AUTH_CALLBACK_URL:http://localhost:9000/auth/callback}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9000}
