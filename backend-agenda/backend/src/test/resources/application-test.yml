spring:
  datasource:
    url: jdbc:h2:mem:agendas_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

jwt:
  secret: test_secret_value_with_at_least_32_chars
  expiration: 86400000

google:
  client-id: test-client-id
  client-secret: test-client-secret
  redirect-uri: http://localhost:8080/auth/google/callback
  state-expiration-seconds: 600
  state-cookie-secure: false

app:
  frontend-auth-callback-url: http://localhost:9000/auth/callback
  cors:
    allowed-origins: http://localhost:9000
